<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Emerald background -->
  <rect width="512" height="512" fill="#0F3D2E"/>

  <!-- Inner brass hairline frame -->
  <rect x="32" y="32" width="448" height="448"
        fill="none"
        stroke="#B08A3A"
        stroke-width="1.5"
        opacity="0.4"/>

  <!-- Vitrine wordmark — large, centered vertically, in cream serif -->
  <text x="256" y="295"
        font-family="'Fraunces', 'Playfair Display', Georgia, serif"
        font-size="125"
        font-weight="400"
        fill="#F5EFE0"
        text-anchor="middle"
        letter-spacing="2">Vitrine</text>
</svg>
